<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Taller Bercial, San Teodoro – Capitulo II El Taller y la Deuda">
  <defs>
    <linearGradient id="wall2z" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1208"/><stop offset="100%" stop-color="#2e1c0e"/>
    </linearGradient>
    <linearGradient id="floor2z" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4430"/><stop offset="100%" stop-color="#3e2c1c"/>
    </linearGradient>
    <radialGradient id="lamp2z" cx="58%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#ffdf80" stop-opacity="0.7"/><stop offset="100%" stop-color="#ffc840" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="forg2" cx="38%" cy="70%" r="52%">
      <stop offset="0%" stop-color="#ff6010" stop-opacity="0.55"/><stop offset="100%" stop-color="#ff4000" stop-opacity="0"/>
    </radialGradient>
    <filter id="gb2"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <!-- Room wall + warm lamplight glow -->
  <rect width="1200" height="720" fill="url(#wall2z)"/>
  <ellipse cx="700" cy="140" rx="550" ry="420" fill="url(#lamp2z)"/>
  <!-- Forge glow bottom left -->
  <ellipse cx="160" cy="600" rx="240" ry="200" fill="url(#forg2)" filter="url(#gb2)"/>
  <!-- Floor -->
  <rect x="0" y="480" width="1200" height="240" fill="url(#floor2z)"/>
  <!-- Floor planks -->
  <g stroke="rgba(30,14,4,0.55)" stroke-width="1.8" fill="none">
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="0" y1="550" x2="1200" y2="550"/><line x1="0" y1="575" x2="1200" y2="575"/>
    <line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="625" x2="1200" y2="625"/>
    <line x1="0" y1="650" x2="1200" y2="650"/><line x1="0" y1="675" x2="1200" y2="675"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
  </g>
  <g stroke="rgba(30,14,4,0.3)" stroke-width="1" fill="none">
    <line x1="110" y1="480" x2="90" y2="720"/><line x1="250" y1="480" x2="230" y2="720"/>
    <line x1="390" y1="480" x2="370" y2="720"/><line x1="530" y1="480" x2="510" y2="720"/>
    <line x1="670" y1="480" x2="650" y2="720"/><line x1="810" y1="480" x2="790" y2="720"/>
    <line x1="950" y1="480" x2="930" y2="720"/><line x1="1090" y1="480" x2="1070" y2="720"/>
  </g>
  <!-- Ceiling beams -->
  <rect x="0" y="0" width="1200" height="45" fill="#180e06"/>
  <g fill="#10080a" stroke="#2a1608" stroke-width="2">
    <rect x="0"   y="0" width="28" height="480"/>
    <rect x="90"  y="0" width="28" height="480"/>
    <rect x="220" y="0" width="28" height="480"/>
    <rect x="350" y="0" width="28" height="480"/>
    <rect x="480" y="0" width="28" height="480"/>
    <rect x="610" y="0" width="28" height="480"/>
    <rect x="740" y="0" width="28" height="480"/>
    <rect x="870" y="0" width="28" height="480"/>
    <rect x="1000" y="0" width="28" height="480"/>
    <rect x="1130" y="0" width="28" height="480"/>
  </g>
  <!-- WORKBENCH (main) -->
  <rect x="90" y="310" width="680" height="175" rx="6" fill="#6a3c14" stroke="#8a5022" stroke-width="3"/>
  <rect x="90" y="300" width="680" height="16"  rx="4" fill="#8a5820"/>
  <!-- Workbench legs -->
  <rect x="105" y="482" width="18" height="200" fill="#4a2c0a"/>
  <rect x="280" y="482" width="18" height="200" fill="#4a2c0a"/>
  <rect x="500" y="482" width="18" height="200" fill="#4a2c0a"/>
  <rect x="730" y="482" width="18" height="200" fill="#4a2c0a"/>
  <!-- Workbench items: scattered clock parts -->
  <!-- Large main gear assembly on bench -->
  <g transform="translate(188 364)">
    <circle cx="0" cy="0" r="68" fill="none" stroke="#c09830" stroke-width="7"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#a07820" stroke-width="3"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#c09830" stroke-width="5"/>
    <circle cx="0" cy="0" r="10" fill="#c09830"/>
    <!-- Gear teeth marks -->
    <g stroke="#c09830" stroke-width="8" stroke-linecap="square">
      <line x1="0"  y1="-75" x2="0"  y2="-62"/>
      <line x1="53" y1="-53" x2="44" y2="-44"/>
      <line x1="75" y1="0"   x2="62" y2="0"/>
      <line x1="53" y1="53"  x2="44" y2="44"/>
      <line x1="0"  y1="75"  x2="0"  y2="62"/>
      <line x1="-53" y1="53" x2="-44" y2="44"/>
      <line x1="-75" y1="0"  x2="-62" y2="0"/>
      <line x1="-53" y1="-53" x2="-44" y2="-44"/>
    </g>
    <!-- Spoke lines -->
    <g stroke="#906810" stroke-width="2.5">
      <line x1="0" y1="-52" x2="0" y2="52"/>
      <line x1="-45" y1="-26" x2="45" y2="26"/>
      <line x1="45" y1="-26" x2="-45" y2="26"/>
    </g>
  </g>
  <!-- Medium gear -->
  <g transform="translate(392 374)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="#a07820" stroke-width="5"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#886010" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#a07820" stroke-width="3"/>
    <circle cx="0" cy="0" r="7" fill="#a07820"/>
    <g stroke="#a07820" stroke-width="6" stroke-linecap="square">
      <line x1="0"  y1="-53" x2="0"  y2="-42"/><line x1="37" y1="-37" x2="30" y2="-30"/>
      <line x1="53" y1="0"   x2="42" y2="0"/>  <line x1="37" y1="37"  x2="30" y2="30"/>
      <line x1="0"  y1="53"  x2="0"  y2="42"/>  <line x1="-37" y1="37" x2="-30" y2="30"/>
      <line x1="-53" y1="0"  x2="-42" y2="0"/> <line x1="-37" y1="-37" x2="-30" y2="-30"/>
    </g>
    <g stroke="#806010" stroke-width="2"><line x1="0" y1="-35" x2="0" y2="35"/><line x1="-30" y1="-17" x2="30" y2="17"/><line x1="30" y1="-17" x2="-30" y2="17"/></g>
  </g>
  <!-- Small gear -->
  <g transform="translate(530 350)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#8a6820" stroke-width="4"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#7a5818" stroke-width="2"/>
    <circle cx="0" cy="0" r="8"  fill="#8a6820"/>
    <g stroke="#8a6820" stroke-width="5" stroke-linecap="square">
      <line x1="0" y1="-35" x2="0" y2="-25"/><line x1="25" y1="-25" x2="20" y2="-20"/>
      <line x1="35" y1="0"  x2="25" y2="0"/> <line x1="25" y1="25"  x2="20" y2="20"/>
      <line x1="0" y1="35"  x2="0" y2="25"/> <line x1="-25" y1="25" x2="-20" y2="20"/>
      <line x1="-35" y1="0" x2="-25" y2="0"/><line x1="-25" y1="-25" x2="-20" y2="-20"/>
    </g>
  </g>
  <!-- Ledger / open account book on bench -->
  <rect x="580" y="310" width="110" height="88" rx="3" fill="#e8d8a8" stroke="#8a6030" stroke-width="2" transform="rotate(-6 635 354)"/>
  <rect x="582" y="312" width="50"  height="84" rx="2" fill="#e0d098" stroke="#8a6030" stroke-width="1" transform="rotate(-6 607 354)"/>
  <g stroke="rgba(60,40,10,0.5)" stroke-width="0.8" transform="rotate(-6 635 354)">
    <line x1="586" y1="322" x2="684" y2="322"/><line x1="586" y1="330" x2="684" y2="330"/>
    <line x1="586" y1="338" x2="684" y2="338"/><line x1="586" y1="346" x2="684" y2="346"/>
    <line x1="586" y1="354" x2="684" y2="354"/><line x1="586" y1="362" x2="684" y2="362"/>
    <line x1="586" y1="370" x2="684" y2="370"/>
  </g>
  <!-- Red underline = debt entry -->
  <line x1="592" y1="358" x2="660" y2="354" stroke="#a02010" stroke-width="2" transform="rotate(-6 635 354)"/>
