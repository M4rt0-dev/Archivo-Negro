  <rect x="660" y="315" width="22" height="28" rx="10" fill="#1a0808" stroke="#5a3010" stroke-width="1.5"/>
  <ellipse cx="671" cy="315" rx="11" ry="5" fill="#2a0a0a" stroke="#5a3010" stroke-width="1"/>
  <!-- Spring/coil -->
  <g stroke="#9a8020" stroke-width="3" fill="none" transform="translate(640 430)">
    <path d="M0,0 Q15,-8 30,0 Q45,8 60,0 Q75,-8 90,0 Q105,8 120,0"/>
    <path d="M0,8 Q15,0 30,8 Q45,16 60,8 Q75,0 90,8 Q105,16 120,8"/>
  </g>
  <!-- Clock face (half assembled) on bench right side -->
  <circle cx="710" cy="370" r="52" fill="#ece0ba" stroke="#5a4218" stroke-width="3"/>
  <circle cx="710" cy="370" r="46" fill="none" stroke="#8a6a22" stroke-width="1.5"/>
  <g stroke="#2a1a08" stroke-width="2.5" stroke-linecap="round">
    <line x1="710" y1="320" x2="710" y2="328"/><line x1="760" y1="370" x2="752" y2="370"/>
    <line x1="710" y1="420" x2="710" y2="412"/><line x1="660" y1="370" x2="668" y2="370"/>
    <line x1="745" y1="335" x2="739" y2="341"/><line x1="745" y1="405" x2="739" y2="399"/>
    <line x1="675" y1="335" x2="681" y2="341"/><line x1="675" y1="405" x2="681" y2="399"/>
  </g>
  <line x1="710" y1="370" x2="710" y2="336" stroke="#200e04" stroke-width="4" stroke-linecap="round"/>
  <line x1="710" y1="370" x2="736" y2="382" stroke="#200e04" stroke-width="3" stroke-linecap="round"/>
  <circle cx="710" cy="370" r="5" fill="#3a2406"/>
  <!-- Shelf on back wall with watch parts jars -->
  <rect x="820" y="130" width="360" height="18" rx="3" fill="#5a3810" stroke="#3a2408" stroke-width="2"/>
  <rect x="820" y="228" width="360" height="18" rx="3" fill="#5a3810" stroke="#3a2408" stroke-width="2"/>
  <rect x="820" y="328" width="360" height="18" rx="3" fill="#5a3810" stroke="#3a2408" stroke-width="2"/>
  <!-- Jars on shelves -->
  <g fill="#3a6058" stroke="#2a4840" stroke-width="1.5">
    <rect x="836" y="98"  width="24" height="34" rx="4"/><rect x="870" y="103" width="20" height="29" rx="3"/>
    <rect x="900" y="94"  width="26" height="38" rx="4"/><rect x="936" y="100" width="22" height="32" rx="3"/>
    <rect x="968" y="97"  width="24" height="35" rx="4"/><rect x="1002" y="105" width="20" height="27" rx="3"/>
    <rect x="1032" y="96" width="26" height="36" rx="4"/><rect x="1068" y="102" width="24" height="30" rx="3"/>
    <rect x="1102" y="97" width="22" height="35" rx="4"/><rect x="1134" y="100" width="28" height="32" rx="4"/>
  </g>
  <!-- Window rear wall (shows night outside) -->
  <rect x="840" y="150" width="140" height="80" rx="5" fill="#080e18" stroke="#4a3010" stroke-width="4"/>
  <line x1="910" y1="150" x2="910" y2="230" stroke="#4a3010" stroke-width="3"/>
  <line x1="840" y1="190" x2="980" y2="190" stroke="#4a3010" stroke-width="3"/>
  <circle cx="880" cy="170" r="14" fill="#c8d0e0" fill-opacity="0.5"/><!-- Moon through window -->
  <circle cx="888" cy="165" r="11" fill="#080e18"/><!-- crescent -->
  <!-- Overhead hanging lamp -->
  <line x1="700" y1="0" x2="700" y2="55" stroke="#7a5020" stroke-width="3"/>
  <path d="M678,55 L722,55 L728,88 L672,88 Z" fill="#b09030" stroke="#806010" stroke-width="1.5"/>
  <ellipse cx="700" cy="88" rx="22" ry="14" fill="rgba(255,220,100,0.9)"/>
  <ellipse cx="700" cy="100" rx="34" ry="26" fill="rgba(255,210,80,0.18)"/>
  <!-- Forge / hearth bottom left -->
  <rect x="0" y="400" width="180" height="320" fill="#2a1808"/>
  <rect x="18" y="420" width="144" height="260" fill="#1e1008"/>
  <rect x="0"  y="390" width="180" height="14"  fill="#3a2210"/>
  <!-- Forge fire glow -->
  <ellipse cx="90" cy="420" rx="72" ry="50" fill="rgba(255,80,10,0.45)"/>
  <ellipse cx="90" cy="430" rx="50" ry="35" fill="rgba(255,140,30,0.5)"/>
  <!-- Flame shapes -->
  <path d="M66,460 Q78,400 90,390 Q102,400 90,420 Q100,400 108,410 Q115,390 120,420 Q130,400 126,460 Z" fill="rgba(255,160,30,0.7)"/>
  <path d="M75,460 Q84,415 90,408 Q96,415 90,432 Q98,415 104,428 Q110,410 116,442 Q122,420 118,460 Z" fill="rgba(255,210,80,0.55)"/>
  <!-- Anvil -->
  <rect x="820" y="430" width="120" height="52" rx="8" fill="#3a3030" stroke="#2a2020" stroke-width="2"/>
  <rect x="810" y="478" width="140" height="16" rx="4" fill="#302828"/>
  <rect x="830" y="494" width="30" height="50" fill="#302828"/>
  <rect x="900" y="494" width="30" height="50" fill="#302828"/>
  <!-- Tool hooks on wall right side -->
  <rect x="1000" y="0" width="6" height="480" fill="#28200e"/>
  <g fill="none" stroke="#4a3818" stroke-width="2.5" stroke-linecap="round">
    <path d="M1006,80 Q1040,80 1040,100 Q1040,120 1020,120"/>
    <path d="M1006,160 Q1050,160 1050,185 Q1050,210 1030,210"/>
    <path d="M1006,260 Q1035,260 1035,280 Q1035,300 1015,300"/>
    <path d="M1006,360 Q1045,360 1045,382 Q1045,404 1025,404"/>
  </g>
  <!-- Tools hanging: pliers shape -->
  <g fill="#7a6830" stroke="#5a4818" stroke-width="1">
    <rect x="1035" y="120" width="8" height="40" rx="3" transform="rotate(12 1039 140)"/>
    <rect x="1043" y="122" width="8" height="40" rx="3" transform="rotate(-6 1047 142)"/>
  </g>
  <!-- Title label -->
  <rect x="10" y="630" width="360" height="82" rx="10" fill="rgba(10,4,2,0.88)"/>
  <rect x="14" y="634" width="352" height="74" rx="8" fill="none" stroke="rgba(200,150,50,0.45)" stroke-width="1.2"/>
  <text x="190" y="661" font-family="Georgia,serif" font-size="18" fill="#f0d888" font-weight="700" text-anchor="middle">Taller Bercial</text>
  <text x="190" y="682" font-family="Georgia,serif" font-size="13" fill="#c8a450" text-anchor="middle">San Teodoro · Otoño 1912</text>
  <text x="190" y="703" font-family="Georgia,serif" font-size="10" fill="#987840" text-anchor="middle" font-style="italic">«Las piezas hablan mejor que los testigos»</text>
</svg>
