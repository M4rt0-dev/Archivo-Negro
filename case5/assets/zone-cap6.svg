<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Sala del Reloj Maestro – Capitulo VI El Veredicto del Reloj Maestro">
  <defs>
    <linearGradient id="bg6z" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06080e"/><stop offset="100%" stop-color="#14100a"/>
    </linearGradient>
    <radialGradient id="spot6z" cx="28%" cy="15%" r="52%">
      <stop offset="0%" stop-color="#e8c040" stop-opacity="0.55"/><stop offset="100%" stop-color="#e8c040" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deskL" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ffd870" stop-opacity="0.75"/><stop offset="100%" stop-color="#ffd870" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="copper6" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c07820" stop-opacity="0.7"/><stop offset="100%" stop-color="#b06818" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fl6z" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1408"/><stop offset="100%" stop-color="#100c06"/>
    </linearGradient>
    <filter id="gb6"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg6z)"/>
  <!-- Ambient warm glow (gear wall) -->
  <ellipse cx="700" cy="300" rx="600" ry="420" fill="url(#copper6)"/>
  <ellipse cx="330" cy="500" rx="280" ry="180" fill="url(#deskL)"/>
  <!-- Spotlight cone from above -->
  <polygon points="700,0 540,460 860,460" fill="url(#spot6z)" opacity="0.45"/>
  <!-- Stone floor -->
  <rect x="0" y="560" width="1200" height="160" fill="url(#fl6z)"/>
  <g stroke="rgba(40,30,12,0.5)" stroke-width="1.2" fill="none">
    <line x1="0" y1="580" x2="1200" y2="580"/><line x1="0" y1="610" x2="1200" y2="610"/>
    <line x1="0" y1="640" x2="1200" y2="640"/><line x1="0" y1="670" x2="1200" y2="670"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
  </g>
  <g stroke="rgba(40,30,12,0.35)" stroke-width="0.8" fill="none">
    <line x1="120" y1="560" x2="120" y2="720"/><line x1="240" y1="560" x2="240" y2="720"/>
    <line x1="360" y1="560" x2="360" y2="720"/><line x1="480" y1="560" x2="480" y2="720"/>
    <line x1="600" y1="560" x2="600" y2="720"/><line x1="720" y1="560" x2="720" y2="720"/>
    <line x1="840" y1="560" x2="840" y2="720"/><line x1="960" y1="560" x2="960" y2="720"/>
    <line x1="1080" y1="560" x2="1080" y2="720"/>
  </g>
  <!-- GEAR WALL BACKGROUND (right/center) -->
  <rect x="430" y="0" width="770" height="566" fill="#100a06"/>
  <!-- Large MASTER CLOCK FACE (center-left of gear wall) -->
  <!-- Master clock outer ring -->
  <circle cx="700" cy="280" r="208" fill="#0e0a06" stroke="#9a7018" stroke-width="8"/>
  <circle cx="700" cy="280" r="196" fill="none" stroke="#7a5810" stroke-width="3"/>
  <circle cx="700" cy="280" r="184" fill="#16120a" stroke="#8a6818" stroke-width="2.5"/>
  <!-- Hour ring with fine tick marks -->
  <g stroke="#b08820" stroke-linecap="square">
    <!-- 12 major ticks (hour) -->
    <g stroke-width="6">
      <line x1="700" y1="80"  x2="700" y2="106"/>
      <line x1="802" y1="107" x2="789" y2="130"/>
      <line x1="873" y1="178" x2="852" y2="191"/>
      <line x1="900" y1="280" x2="874" y2="280"/>
      <line x1="873" y1="382" x2="852" y2="369"/>
      <line x1="802" y1="453" x2="789" y2="430"/>
      <line x1="700" y1="480" x2="700" y2="454"/>
      <line x1="598" y1="453" x2="611" y2="430"/>
      <line x1="527" y1="382" x2="548" y2="369"/>
      <line x1="500" y1="280" x2="526" y2="280"/>
      <line x1="527" y1="178" x2="548" y2="191"/>
      <line x1="598" y1="107" x2="611" y2="130"/>
    </g>
    <!-- 48 minor ticks -->
    <g stroke-width="2" opacity="0.6">
      <line x1="726" y1="81"  x2="726" y2="95"/>  <line x1="752" y1="87"  x2="748" y2="100"/>
      <line x1="776" y1="97"  x2="768" y2="108"/> <line x1="672" y1="81"  x2="672" y2="95"/>
      <line x1="648" y1="87"  x2="652" y2="100"/> <line x1="624" y1="97"  x2="632" y2="108"/>
      <line x1="820" y1="118" x2="813" y2="132"/> <line x1="836" y1="135" x2="826" y2="146"/>
      <line x1="848" y1="156" x2="836" y2="164"/> <line x1="889" y1="214" x2="877" y2="222"/>
      <line x1="895" y1="247" x2="882" y2="249"/> <line x1="895" y1="313" x2="882" y2="311"/>
      <line x1="889" y1="346" x2="877" y2="338"/> <line x1="848" y1="404" x2="836" y2="396"/>
      <line x1="836" y1="425" x2="826" y2="414"/> <line x1="820" y1="442" x2="813" y2="428"/>
      <line x1="580" y1="118" x2="587" y2="132"/> <line x1="564" y1="135" x2="574" y2="146"/>
      <line x1="552" y1="156" x2="564" y2="164"/> <line x1="511" y1="214" x2="523" y2="222"/>
      <line x1="505" y1="247" x2="518" y2="249"/> <line x1="505" y1="313" x2="518" y2="311"/>
      <line x1="511" y1="346" x2="523" y2="338"/> <line x1="552" y1="404" x2="564" y2="396"/>
    </g>
  </g>
  <!-- Roman numerals on clock face -->
  <g font-family="Georgia,serif" font-size="22" font-weight="700" fill="#c09020" text-anchor="middle">
    <text x="700" y="122">XII</text><text x="782" y="146">I</text>
    <text x="846" y="210">II</text><text x="872" y="290">III</text>
    <text x="846" y="370">IV</text><text x="782" y="432">V</text>
    <text x="700" y="458">VI</text><text x="618" y="432">VII</text>
    <text x="554" y="370">VIII</text><text x="528" y="290">IX</text>
    <text x="554" y="210">X</text><text x="618" y="146">XI</text>
  </g>
  <!-- Inner gear rings on clock face -->
  <circle cx="700" cy="280" r="100" fill="none" stroke="#6a5010" stroke-width="2"/>
  <circle cx="700" cy="280" r="50"  fill="#0e0a06" stroke="#8a6010" stroke-width="3.5"/>
  <circle cx="700" cy="280" r="18"  fill="none" stroke="#6a5010" stroke-width="2"/>
  <!-- Clock hands (pointing to judgment hour) -->
  <line x1="700" y1="280" x2="700" y2="118" stroke="#e8c040" stroke-width="8" stroke-linecap="round"/><!-- hour (XII) -->
  <line x1="700" y1="280" x2="782" y2="280" stroke="#e8c040" stroke-width="5" stroke-linecap="round"/><!-- minute (III) -->
  <line x1="700" y1="280" x2="686" y2="340" stroke="#c02010" stroke-width="3" stroke-linecap="round"/><!-- seconds -->
  <circle cx="700" cy="280" r="10" fill="#e8c040" stroke="#a07010" stroke-width="2"/>
  <!-- SATELLITE GEAR (upper right) -->
  <g transform="translate(940 130)">
    <circle cx="0" cy="0" r="78" fill="none" stroke="#8a6810" stroke-width="5"/>
    <circle cx="0" cy="0" r="66" fill="#12100a" stroke="#6a5010" stroke-width="2"/>
    <circle cx="0" cy="0" r="30" fill="#0e0c06" stroke="#8a6010" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#6a5010" stroke-width="2"/>
    <circle cx="0" cy="0" r="6"  fill="#b07820"/>
    <!-- Spoke lines -->
    <g stroke="#705010" stroke-width="3">
      <line x1="0" y1="-66" x2="0"   y2="-30"/><line x1="0"   y1="30"  x2="0"   y2="66"/>
      <line x1="-57" y1="-33" x2="-26" y2="-15"/><line x1="26" y1="15" x2="57" y2="33"/>
      <line x1="57" y1="-33" x2="26" y2="-15"/><line x1="-26" y1="15" x2="-57" y2="33"/>
    </g>
    <!-- Gear teeth (decorative marks around outer ring) -->
    <g stroke="#9a7818" stroke-width="3" fill="none">
      <line x1="0" y1="-78" x2="0" y2="-90"/><line x1="39" y1="-68" x2="45" y2="-78"/>
      <line x1="68" y1="-39" x2="78" y2="-45"/><line x1="78" y1="0" x2="90" y2="0"/>
      <line x1="68" y1="39" x2="78" y2="45"/><line x1="39" y1="68" x2="45" y2="78"/>
      <line x1="0" y1="78" x2="0" y2="90"/><line x1="-39" y1="68" x2="-45" y2="78"/>
      <line x1="-68" y1="39" x2="-78" y2="45"/><line x1="-78" y1="0" x2="-90" y2="0"/>
      <line x1="-68" y1="-39" x2="-78" y2="-45"/><line x1="-39" y1="-68" x2="-45" y2="-78"/>
    </g>
  </g>
  <!-- SATELLITE GEAR (lower right) -->
  <g transform="translate(1000 450)">
    <circle cx="0" cy="0" r="62" fill="none" stroke="#7a5e0e" stroke-width="5"/>
    <circle cx="0" cy="0" r="50" fill="#12100a" stroke="#5a4c0e" stroke-width="2"/>
    <circle cx="0" cy="0" r="22" fill="#0e0c06" stroke="#7a5e0e" stroke-width="3"/>
    <circle cx="0" cy="0" r="8"  fill="#a06810"/>
    <g stroke="#604e0e" stroke-width="3">
      <line x1="0" y1="-50" x2="0" y2="-22"/><line x1="0" y1="22" x2="0" y2="50"/>
      <line x1="-43" y1="-25" x2="-20" y2="-11"/><line x1="20" y1="11" x2="43" y2="25"/>
      <line x1="43" y1="-25" x2="20" y2="-11"/><line x1="-20" y1="11" x2="-43" y2="25"/>
    </g>
    <g stroke="#8a6810" stroke-width="3" fill="none">
      <line x1="0" y1="-62" x2="0" y2="-74"/><line x1="31" y1="-54" x2="37" y2="-64"/>
      <line x1="54" y1="-31" x2="64" y2="-37"/><line x1="62" y1="0" x2="74" y2="0"/>
      <line x1="54" y1="31" x2="64" y2="37"/><line x1="31" y1="54" x2="37" y2="64"/>
      <line x1="0" y1="62" x2="0" y2="74"/><line x1="-31" y1="54" x2="-37" y2="64"/>
      <line x1="-54" y1="31" x2="-64" y2="37"/><line x1="-62" y1="0" x2="-74" y2="0"/>
      <line x1="-54" y1="-31" x2="-64" y2="-37"/><line x1="-31" y1="-54" x2="-37" y2="-64"/>
    </g>
  </g>
  <!-- SMALL GEAR (upper area near spotlight) -->
  <g transform="translate(540 105)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#7a5e0e" stroke-width="4"/>
    <circle cx="0" cy="0" r="33" fill="#12100a" stroke="#5a4c0e" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="#0e0c06" stroke="#7a5e0e" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5"  fill="#a06810"/>
    <g stroke="#604e0e" stroke-width="2.5">
      <line x1="0" y1="-33" x2="0" y2="-15"/><line x1="0" y1="15" x2="0" y2="33"/>
      <line x1="-28" y1="-16" x2="-13" y2="-8"/><line x1="13" y1="8" x2="28" y2="16"/>
      <line x1="28" y1="-16" x2="13" y2="-8"/><line x1="-13" y1="8" x2="-28" y2="16"/>
    </g>
  </g>
  <!-- Connecting shaft between master clock and upper gear -->
  <line x1="908" y1="130" x2="880" y2="185" stroke="#7a5810" stroke-width="6" stroke-linecap="round"/>
  <!-- Connecting shaft between master clock and lower gear -->
  <line x1="938" y1="450" x2="900" y2="400" stroke="#7a5810" stroke-width="5" stroke-linecap="round"/>
  <!-- ESCAPEMENT WHEEL (left, visible through wall cut) -->
  <g transform="translate(465 370)">
    <circle cx="0" cy="0" r="44" fill="none" stroke="#8a6810" stroke-width="3"/>
    <circle cx="0" cy="0" r="34" fill="#100e08" stroke="#6a5010" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#0c0a06" stroke="#8a6010" stroke-width="2"/>
    <circle cx="0" cy="0" r="4"  fill="#a07018"/>
    <!-- Escapement teeth (irregular) -->
    <g stroke="#9a7818" stroke-width="3" fill="none">
      <line x1="0"   y1="-44" x2="6"   y2="-56"/>
      <line x1="22"  y1="-38" x2="28"  y2="-50"/>
      <line x1="38"  y1="-22" x2="50"  y2="-22"/>
      <line x1="44"  y1="0"   x2="56"  y2="6"/>
      <line x1="38"  y1="22"  x2="50"  y2="28"/>
      <line x1="22"  y1="38"  x2="22"  y2="52"/>
      <line x1="0"   y1="44"  x2="-6"  y2="56"/>
      <line x1="-22" y1="38"  x2="-28" y2="50"/>
      <line x1="-38" y1="22"  x2="-50" y2="22"/>
      <line x1="-44" y1="0"   x2="-56" y2="-6"/>
      <line x1="-38" y1="-22" x2="-50" y2="-28"/>
      <line x1="-22" y1="-38" x2="-22" y2="-52"/>
    </g>
    <g stroke="#705010" stroke-width="2.5">
      <line x1="0" y1="-34" x2="0" y2="-10"/><line x1="0" y1="10" x2="0" y2="34"/>
      <line x1="-29" y1="-17" x2="-13" y2="-6"/><line x1="13" y1="6" x2="29" y2="17"/>
      <line x1="29" y1="-17" x2="13" y2="-6"/><line x1="-13" y1="6" x2="-29" y2="17"/>
    </g>
  </g>
  <!-- CYLINDER MUSIC BOX (right of desk) -->
  <g transform="translate(180 500)">
    <!-- cylinder body -->
    <rect x="0" y="-18" width="120" height="36" rx="18" fill="#4a3810" stroke="#7a5818" stroke-width="2"/>
    <!-- pin bands on cylinder -->
    <g stroke="#8a6818" stroke-width="1">
      <line x1="20" y1="-18" x2="20" y2="18"/><line x1="40" y1="-18" x2="40" y2="18"/>
      <line x1="60" y1="-18" x2="60" y2="18"/><line x1="80" y1="-18" x2="80" y2="18"/>
      <line x1="100" y1="-18" x2="100" y2="18"/>
    </g>
    <!-- pins (small circles) -->
    <g fill="#b09020">
      <circle cx="12" cy="-6" r="2.5"/><circle cx="12" cy="8" r="2.5"/>
      <circle cx="30" cy="2" r="2.5"/><circle cx="30" cy="-12" r="2.5"/>
      <circle cx="50" cy="-8" r="2.5"/><circle cx="50" cy="12" r="2.5"/>
      <circle cx="70" cy="4" r="2.5"/><circle cx="70" cy="-10" r="2.5"/>
      <circle cx="90" cy="-4" r="2.5"/><circle cx="90" cy="14" r="2.5"/>
      <circle cx="110" cy="0" r="2.5"/><circle cx="110" cy="-14" r="2.5"/>
    </g>
    <!-- comb (tines) -->
    <rect x="10" y="-32" width="100" height="14" rx="3" fill="#6a5018" stroke="#8a6828" stroke-width="1"/>
    <g stroke="#9a8020" stroke-width="1.5">
      <line x1="18" y1="-32" x2="18" y2="-18"/><line x1="26" y1="-32" x2="26" y2="-18"/>
      <line x1="34" y1="-32" x2="34" y2="-18"/><line x1="42" y1="-32" x2="42" y2="-18"/>
      <line x1="50" y1="-32" x2="50" y2="-18"/><line x1="58" y1="-32" x2="58" y2="-18"/>
      <line x1="66" y1="-32" x2="66" y2="-18"/><line x1="74" y1="-32" x2="74" y2="-18"/>
      <line x1="82" y1="-32" x2="82" y2="-18"/><line x1="90" y1="-32" x2="90" y2="-18"/>
      <line x1="98" y1="-32" x2="98" y2="-18"/>
    </g>
  </g>
  <!-- DESK (left) -->
  <rect x="40" y="500" width="380" height="70" rx="6" fill="#4a3010" stroke="#6a4818" stroke-width="2"/>
  <rect x="40" y="490" width="380" height="16" rx="4" fill="#6a4818"/>
  <rect x="56"  y="568" width="16" height="70" fill="#3a2008"/>
  <rect x="386" y="568" width="16" height="70" fill="#3a2008"/>
  <!-- Desk items -->
  <!-- Oil lamp on desk -->
  <rect x="64" y="478" width="20" height="26" rx="8" fill="#a07018" stroke="#806010" stroke-width="1.5"/>
  <path d="M64,480 L74,466 L84,480" fill="none" stroke="#c09030" stroke-width="2"/>
  <ellipse cx="74" cy="464" rx="8" ry="6" fill="rgba(255,210,80,0.92)"/>
  <ellipse cx="74" cy="480" rx="24" ry="18" fill="rgba(255,210,80,0.15)"/>
  <!-- CONSTELLATION MAP on desk (puzzle element) -->
  <rect x="100" y="484" width="180" height="80" rx="3" fill="#e8d8a8" stroke="#8a7030" stroke-width="1.5" transform="rotate(-4 190 524)"/>
  <!-- Star chart markings -->
  <g fill="#1a1206" transform="rotate(-4 190 524)">
    <circle cx="115" cy="500" r="2.5"/><circle cx="140" cy="494" r="2"/><circle cx="162" cy="504" r="2.5"/>
    <circle cx="185" cy="496" r="2"/><circle cx="210" cy="508" r="2.5"/><circle cx="232" cy="498" r="2"/>
    <circle cx="248" cy="512" r="2.5"/><circle cx="128" cy="518" r="2"/><circle cx="155" cy="524" r="2.5"/>
    <circle cx="177" cy="516" r="2"/><circle cx="200" cy="526" r="2.5"/><circle cx="222" cy="520" r="2"/>
    <circle cx="244" cy="530" r="2"/><circle cx="130" cy="538" r="2.5"/><circle cx="160" cy="544" r="2"/>
    <circle cx="190" cy="536" r="2.5"/><circle cx="220" cy="548" r="2"/><circle cx="246" cy="540" r="2.5"/>
  </g>
  <!-- Star connections (constellation lines) -->
  <g stroke="rgba(26,18,6,0.4)" stroke-width="1" transform="rotate(-4 190 524)">
    <line x1="115" y1="500" x2="140" y2="494"/><line x1="140" y1="494" x2="162" y2="504"/>
    <line x1="162" y1="504" x2="185" y2="496"/><line x1="185" y1="496" x2="210" y2="508"/>
    <line x1="210" y1="508" x2="232" y2="498"/><line x1="155" y1="524" x2="177" y2="516"/>
    <line x1="177" y1="516" x2="200" y2="526"/><line x1="200" y1="526" x2="222" y2="520"/>
    <line x1="162" y1="504" x2="155" y2="524"/><line x1="200" y1="526" x2="210" y2="508"/>
  </g>
  <!-- Map label -->
  <text x="190" y="556" font-family="Georgia,serif" font-size="9" fill="#3a2806" text-anchor="middle" transform="rotate(-4 190 556)" font-style="italic">Carta celeste – constelaciones</text>
  <!-- Open ledger on desk -->
  <rect x="295" y="480" width="118" height="88" rx="3" fill="#ecdca8" stroke="#8a7030" stroke-width="1.5" transform="rotate(3 354 524)"/>
  <g stroke="rgba(40,25,8,0.35)" stroke-width="0.8" transform="rotate(3 354 524)">
    <line x1="300" y1="494" x2="408" y2="494"/><line x1="300" y1="505" x2="408" y2="505"/>
    <line x1="300" y1="516" x2="408" y2="516"/><line x1="300" y1="527" x2="408" y2="527"/>
    <line x1="300" y1="538" x2="408" y2="538"/><line x1="300" y1="549" x2="380" y2="549"/>
  </g>
  <line x1="354" y1="480" x2="354" y2="568" stroke="rgba(100,60,20,0.3)" stroke-width="1" transform="rotate(3 354 524)"/>
  <!-- DETECTIVE FIGURE at desk (silhouette with magnifier) -->
  <g opacity="0.7" transform="translate(38 420)">
    <ellipse cx="26" cy="0" rx="14" ry="12" fill="#080c10"/><!-- head -->
    <rect x="14" y="10" width="24" height="50" rx="5 5 0 0" fill="#080c10"/><!-- body -->
    <!-- arm reaching forward -->
    <line x1="38" y1="28" x2="68" y2="52" stroke="#080c10" stroke-width="7" stroke-linecap="round"/>
    <!-- magnifier -->
    <circle cx="72" cy="56" r="14" fill="none" stroke="#080c10" stroke-width="5"/>
    <line x1="82" y1="66" x2="94" y2="76" stroke="#080c10" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Title label -->
  <rect x="424" y="596" width="388" height="118" rx="10" fill="rgba(4,4,10,0.92)"/>
  <rect x="428" y="600" width="380" height="110" rx="8" fill="none" stroke="rgba(200,170,60,0.5)" stroke-width="1.2"/>
  <text x="618" y="630" font-family="Georgia,serif" font-size="19" fill="#f8e090" font-weight="700" text-anchor="middle">Sala del Reloj Maestro</text>
  <text x="618" y="653" font-family="Georgia,serif" font-size="13" fill="#d0aa50" text-anchor="middle">San Teodoro · Otoño 1912</text>
  <text x="618" y="674" font-family="Georgia,serif" font-size="10" fill="#a08840" text-anchor="middle" font-style="italic">«El mecanismo no miente — sus engranajes son</text>
  <text x="618" y="690" font-family="Georgia,serif" font-size="10" fill="#a08840" text-anchor="middle" font-style="italic">más honestos que los hombres que lo construyeron»</text>
  <text x="618" y="706" font-family="Georgia,serif" font-size="9" fill="#786228" text-anchor="middle">Acceso restringido — Sala de máquinas principal</text>
</svg>
