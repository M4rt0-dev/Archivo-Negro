      <stop offset="0%" stop-color="#080c18"/><stop offset="55%" stop-color="#101828"/><stop offset="100%" stop-color="#1c2436"/>
    </linearGradient>
    <linearGradient id="ground5z" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#282018"/><stop offset="100%" stop-color="#1a1408"/>
    </linearGradient>
    <radialGradient id="train5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd878" stop-opacity="0.9"/><stop offset="100%" stop-color="#ffd878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lamp5z" cx="50%" cy="50%" r="50%">
