  <text x="732" y="81" font-size="12" font-family="Georgia,serif" fill="#90b8d8" text-anchor="middle">Niebla sobre Valdeluna</text>
  <text x="732" y="102" font-size="10" font-family="Georgia,serif" fill="#6890a8" text-anchor="middle" font-style="italic">«Donde la niebla no solo</text>
