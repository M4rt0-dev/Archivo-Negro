<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Campanario Oculto, Torre del Reloj – Capitulo IV El Campanario Oculto">
  <defs>
    <linearGradient id="shaft4z" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040610"/><stop offset="40%" stop-color="#0a0e1a"/><stop offset="100%" stop-color="#161a28"/>
    </linearGradient>
    <radialGradient id="bellG4" cx="50%" cy="12%" r="42%">
      <stop offset="0%" stop-color="#c09030" stop-opacity="0.7"/><stop offset="100%" stop-color="#c09030" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0d0e0" stop-opacity="0.7"/><stop offset="100%" stop-color="#a0b8d0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="woodBeam4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a2810"/><stop offset="50%" stop-color="#4a3818"/><stop offset="100%" stop-color="#3a2810"/>
    </linearGradient>
  </defs>
  <!-- Background: narrow stone shaft interior -->
  <rect width="1200" height="720" fill="url(#shaft4z)"/>
  <!-- Bell glow from above -->
  <ellipse cx="390" cy="80" rx="280" ry="200" fill="url(#bellG4)"/>
  <!-- STONE WALLS left & right with perspective + texture -->
  <!-- Left wall angled -->
  <polygon points="0,0 280,0 360,720 0,720" fill="#2a2018"/>
  <polygon points="0,0 200,0 270,720 0,720" fill="#20180e"/>
  <!-- Stone courses left wall -->
  <g stroke="rgba(50,38,18,0.7)" stroke-width="1.2" fill="none">
    <line x1="0" y1="72"  x2="280" y2="72"/> <line x1="0" y1="144" x2="275" y2="144"/>
    <line x1="0" y1="216" x2="270" y2="216"/><line x1="0" y1="288" x2="265" y2="288"/>
    <line x1="0" y1="360" x2="260" y2="360"/><line x1="0" y1="432" x2="255" y2="432"/>
    <line x1="0" y1="504" x2="252" y2="504"/><line x1="0" y1="576" x2="250" y2="576"/>
    <line x1="0" y1="648" x2="248" y2="648"/>
  </g>
  <!-- Vertical mortar joints left -->
  <g stroke="rgba(50,38,18,0.5)" stroke-width="0.8" fill="none">
    <line x1="55"  y1="0" x2="52"  y2="720"/><line x1="110" y1="0" x2="104" y2="720"/>
    <line x1="165" y1="0" x2="156" y2="720"/><line x1="220" y1="0" x2="208" y2="720"/>
    <line x1="28"  y1="0" x2="26"  y2="720"/>
  </g>
  <!-- Right wall angled -->
  <polygon points="920,0 1200,0 1200,720 840,720" fill="#2a2018"/>
  <polygon points="1000,0 1200,0 1200,720 930,720" fill="#20180e"/>
  <!-- Stone courses right wall -->
  <g stroke="rgba(50,38,18,0.7)" stroke-width="1.2" fill="none">
    <line x1="920" y1="72"  x2="1200" y2="72"/> <line x1="925" y1="144" x2="1200" y2="144"/>
    <line x1="930" y1="216" x2="1200" y2="216"/><line x1="935" y1="288" x2="1200" y2="288"/>
    <line x1="940" y1="360" x2="1200" y2="360"/><line x1="945" y1="432" x2="1200" y2="432"/>
    <line x1="948" y1="504" x2="1200" y2="504"/><line x1="950" y1="576" x2="1200" y2="576"/>
    <line x1="952" y1="648" x2="1200" y2="648"/>
  </g>
  <g stroke="rgba(50,38,18,0.5)" stroke-width="0.8" fill="none">
    <line x1="980"  y1="0" x2="988"  y2="720"/><line x1="1040" y1="0" x2="1048" y2="720"/>
    <line x1="1095" y1="0" x2="1104" y2="720"/><line x1="1150" y1="0" x2="1160" y2="720"/>
  </g>
  <!-- BELL (brass) -->
  <g transform="translate(390 0)">
    <rect x="-96" y="16" width="192" height="22" rx="4" fill="#5a4010"/>
    <rect x="-40" y="16" width="80" height="44" fill="#5a4010"/>
    <!-- Bell shape -->
    <path d="M-90,38 Q-96,60 -105,88 Q-118,130 -112,160 Q-104,188 0,198 Q104,188 112,160 Q118,130 105,88 Q96,60 90,38 Z" fill="#8a6820"/>
    <!-- Bell highlights -->
    <path d="M-80,42 Q-85,65 -90,95 Q-95,125 -82,155 Q-60,180 -30,190 Z" fill="rgba(255,230,130,0.2)"/>
    <!-- Bell bottom lip -->
    <ellipse cx="0" cy="198" rx="112" ry="18" fill="#a07828"/>
    <ellipse cx="0" cy="198" rx="100" ry="12" fill="#906818"/>
    <!-- Clapper -->
    <line x1="0" y1="60" x2="0" y2="188" stroke="#6a4810" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="188" r="10" fill="#6a4810" stroke="#5a3a08" stroke-width="1.5"/>
    <!-- Bell yoke bolts -->
    <circle cx="-65" cy="38" r="6" fill="#6a5018"/>
    <circle cx="65"  cy="38" r="6" fill="#6a5018"/>
    <circle cx="0"   cy="20" r="5" fill="#6a5018"/>
  </g>
  <!-- SUPPORT BEAM (heavy horizontal oak) -->
  <rect x="240" y="216" width="720" height="30" rx="4" fill="url(#woodBeam4)"/>
  <g stroke="rgba(30,18,4,0.5)" stroke-width="1" fill="none">
    <line x1="240" y1="224" x2="960" y2="224"/><line x1="240" y1="238" x2="960" y2="238"/>
  </g>
  <!-- Rope pulley mechanism -->
  <circle cx="390" cy="216" r="18" fill="#4a3818" stroke="#6a5028" stroke-width="2.5"/>
  <circle cx="390" cy="216" r="10" fill="#6a5028"/>
  <line x1="390" y1="234" x2="390" y2="720" stroke="#5a4020" stroke-width="5" stroke-linecap="round"/>
  <!-- Rope kinks -->
  <g stroke="#5a4020" stroke-width="3" fill="none">
    <path d="M390,300 Q398,306 390,312 Q382,318 390,324"/>
    <path d="M390,400 Q398,406 390,412 Q382,418 390,424"/>
    <path d="M390,500 Q398,506 390,512 Q382,518 390,524"/>
  </g>
  <!-- Counterweight on rope (clue) -->
  <rect x="374" y="600" width="32" height="52" rx="4" fill="#5a4830" stroke="#8a6028" stroke-width="2"/>
  <rect x="376" y="602" width="28" height="48" rx="3" fill="#6a5838"/>
  <g stroke="rgba(100,75,30,0.5)" stroke-width="1" fill="none">
    <line x1="376" y1="618" x2="404" y2="618"/><line x1="376" y1="632" x2="404" y2="632"/>
    <line x1="376" y1="646" x2="404" y2="646"/>
  </g>
  <!-- IRON LADDER left side (scratched from official plan) -->
  <g stroke="#2a2018" stroke-width="4" fill="none">
    <line x1="305" y1="224" x2="305" y2="720"/><!-- rail left -->
    <line x1="345" y1="224" x2="345" y2="720"/><!-- rail right -->
    <!-- Rungs -->
    <line x1="305" y1="250" x2="345" y2="250"/><line x1="305" y1="280" x2="345" y2="280"/>
    <line x1="305" y1="310" x2="345" y2="310"/><line x1="305" y1="340" x2="345" y2="340"/>
    <line x1="305" y1="370" x2="345" y2="370"/><line x1="305" y1="400" x2="345" y2="400"/>
    <line x1="305" y1="430" x2="345" y2="430"/><line x1="305" y1="460" x2="345" y2="460"/>
    <line x1="305" y1="490" x2="345" y2="490"/><line x1="305" y1="520" x2="345" y2="520"/>
    <line x1="305" y1="550" x2="345" y2="550"/><line x1="305" y1="580" x2="345" y2="580"/>
    <line x1="305" y1="610" x2="345" y2="610"/><line x1="305" y1="640" x2="345" y2="640"/>
    <line x1="305" y1="670" x2="345" y2="670"/><line x1="305" y1="700" x2="345" y2="700"/>
  </g>
  <!-- Cobweb corner detail -->
  <g stroke="rgba(200,190,170,0.3)" stroke-width="0.8" fill="none">
    <line x1="245" y1="225" x2="285" y2="265"/><line x1="255" y1="225" x2="285" y2="255"/>
    <line x1="265" y1="225" x2="285" y2="245"/>
    <ellipse cx="265" cy="245" rx="22" ry="10" fill="none"/>
    <ellipse cx="270" cy="248" rx="12" ry="5"  fill="none"/>
  </g>
  <!-- Trap door in floor bottom left -->
  <g transform="translate(240 660)">
    <rect x="0" y="0" width="110" height="60" rx="4" fill="#5a3c10" stroke="#8a5c1e" stroke-width="2"/>
    <rect x="0" y="0" width="110" height="10" rx="3 3 0 0" fill="#7a5018"/>
    <rect x="0" y="50" width="110" height="10" rx="0 0 3 3" fill="#7a5018"/>
    <!-- Hinge details -->
    <rect x="8"  y="0" width="18" height="8" rx="2" fill="#6a5018"/>
    <rect x="84" y="0" width="18" height="8" rx="2" fill="#6a5018"/>
    <!-- Keyhole -->
    <circle cx="95" cy="35" r="8"  fill="none" stroke="#a07820" stroke-width="2.5"/>
    <rect   x="92" y="35" width="6" height="10" rx="3" fill="none" stroke="#a07820" stroke-width="2.5"/>
    <text x="55" y="38" font-family="Georgia,serif" font-size="10" fill="rgba(180,140,60,0.7)" text-anchor="middle">Trampilla</text>
  </g>
  <!-- Gear clock face on right wall (the hidden mechanism) -->
  <g transform="translate(780 290)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#8a6820" stroke-width="5"/>
    <circle cx="0" cy="0" r="108" fill="none" stroke="#6a5018" stroke-width="2"/>
    <circle cx="0" cy="0" r="72"  fill="none" stroke="#8a6820" stroke-width="4"/>
    <circle cx="0" cy="0" r="55"  fill="none" stroke="#6a5018" stroke-width="2"/>
    <circle cx="0" cy="0" r="28"  fill="#1a1206" stroke="#8a6820" stroke-width="4"/>
    <circle cx="0" cy="0" r="12"  fill="none" stroke="#6a5018" stroke-width="2"/>
    <circle cx="0" cy="0" r="8"   fill="#c09820"/>
    <!-- Hour ticks -->
    <g stroke="#c09820" stroke-width="6" stroke-linecap="square">
      <line x1="0"   y1="-126" x2="0"   y2="-112"/>
      <line x1="63"  y1="-109" x2="56"  y2="-96"/>
      <line x1="109" y1="-63"  x2="96"  y2="-56"/>
      <line x1="126" y1="0"   x2="112" y2="0"/>
      <line x1="109" y1="63"  x2="96"  y2="56"/>
      <line x1="63"  y1="109" x2="56"  y2="96"/>
      <line x1="0"   y1="126" x2="0"   y2="112"/>
      <line x1="-63" y1="109" x2="-56" y2="96"/>
      <line x1="-109" y1="63" x2="-96" y2="56"/>
      <line x1="-126" y1="0" x2="-112" y2="0"/>
      <line x1="-109" y1="-63" x2="-96" y2="-56"/>
      <line x1="-63" y1="-109" x2="-56" y2="-96"/>
    </g>
    <!-- Spoke lines -->
    <g stroke="#906010" stroke-width="3">
      <line x1="0" y1="-72" x2="0"   y2="-28"/>
      <line x1="0" y1="28"  x2="0"   y2="72"/>
      <line x1="-62" y1="-36" x2="-28" y2="-16"/>
      <line x1="28"  y1="16"  x2="62"  y2="36"/>
      <line x1="62"  y1="-36" x2="28"  y2="-16"/>
      <line x1="-28" y1="16"  x2="-62" y2="36"/>
    </g>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0"  y2="-90" stroke="#c09820" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="55" y2="28"  stroke="#c09820" stroke-width="4" stroke-linecap="round"/>
    <!-- But second hand shows WRONG time vs plaza clock (puzzle clue) -->
    <line x1="0" y1="0" x2="-12" y2="68" stroke="#902010" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Arched window at top (night sky visible) -->
  <rect x="465" y="0" width="108" height="62" rx="54 54 0 0" fill="#060c18"/>
  <circle cx="519" cy="30" r="18" fill="#b0c0d0" fill-opacity="0.5"/><!-- Moon through arch -->
  <circle cx="528" cy="23" r="15" fill="#060c18"/><!-- crescent -->
  <!-- Stars through arch -->
  <g fill="rgba(255,255,255,0.6)">
    <circle cx="472" cy="18" r="1"/><circle cx="498" cy="10" r="1.2"/>
    <circle cx="548" cy="14" r="1"/><circle cx="566" cy="24" r="0.9"/>
  </g>
  <!-- Title label -->
  <rect x="840" y="590" width="352" height="122" rx="10" fill="rgba(4,6,16,0.9)"/>
  <rect x="844" y="594" width="344" height="114" rx="8" fill="none" stroke="rgba(180,140,60,0.5)" stroke-width="1.2"/>
  <text x="1016" y="623" font-family="Georgia,serif" font-size="19" fill="#f0d888" font-weight="700" text-anchor="middle">Campanario Oculto</text>
  <text x="1016" y="646" font-family="Georgia,serif" font-size="13" fill="#c8a450" text-anchor="middle">Torre del Reloj · Otoño 1912</text>
  <text x="1016" y="668" font-family="Georgia,serif" font-size="10" fill="#987840" text-anchor="middle" font-style="italic">«La escalera borrada del plano oficial»</text>
  <text x="1016" y="686" font-family="Georgia,serif" font-size="10" fill="#987840" text-anchor="middle" font-style="italic">El reloj secreto marca otra hora</text>
  <text x="1016" y="702" font-family="Georgia,serif" font-size="9" fill="#746030" text-anchor="middle">Planta superior restringida</text>
</svg>
